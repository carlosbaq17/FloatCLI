<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Opciones - Vibe Terminal</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: #eeeeee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
    }
    .card {
      background-color: #2d2d2d;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-top: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    select, input {
      width: 100%;
      padding: 10px;
      background-color: #1e1e1e;
      color: white;
      border: 1px solid #555;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    button {
      background-color: #007acc;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0098ff;
    }
  </style>
</head>
<body>
  <h1>⚙️ Opciones de Vibe Terminal</h1>
  
  <div class="card">
    <h2>Configuración de la Terminal</h2>
    
    <label for="shell">Shell por defecto (Próximamente)</label>
    <select id="shell" disabled>
      <option>PowerShell (Auto)</option>
      <option>Bash</option>
      <option>CMD</option>
    </select>
    
    <label for="theme">Tema de colores (Próximamente)</label>
    <select id="theme" disabled>
      <option>Oscuro por defecto</option>
      <option>Drácula</option>
      <option>Solarized</option>
    </select>

    <p style="color: #888; font-size: 14px;">Las opciones de personalización se enviarán al Backend Node.js en futuras actualizaciones.</p>
    
    <button id="save" disabled>Guardar</button>
  </div>
</body>
</html>
