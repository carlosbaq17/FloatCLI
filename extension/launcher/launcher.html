<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vibe Terminal Launcher</title>
  <!-- Estilos que luego clonaremos al PiP -->
  <link rel="stylesheet" href="../pip/libs/xterm.css" />
  <link rel="stylesheet" href="../pip/libs/winbox.min.css" />
  <link rel="stylesheet" href="../pip/style.css" />
  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
    }
    button {
      background-color: #007acc;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
    }
    button:hover {
      background-color: #0098ff;
    }
    .warning {
      margin-top: 30px;
      color: #ffcc00;
      font-size: 14px;
      max-width: 400px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Vibe Terminal Launcher</h1>
  <button id="open-pip">🚀 Abrir Ventana PiP</button>
  <div class="warning">
    ⚠️ ATENCIÓN: Esta pestaña mantiene activa la ventana Document PiP. Si cierras esta pestaña, la terminal se cerrará instantáneamente debido a las políticas de seguridad de Chrome.
  </div>
  <script src="launcher.js"></script>
</body>
</html>
